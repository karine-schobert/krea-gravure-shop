nelmio_cors:
  defaults:
    allow_credentials: true
    allow_origin:
      - 'http://localhost:3000'
    allow_headers: ['Content-Type', 'Authorization', 'X-Requested-With']
    allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
    expose_headers: ['Authorization']  # 👈 AJOUT IMPORTANT
    max_age: 3600

  paths:
    '^/api/':
      allow_origin:
        - 'http://localhost:3000'
      allow_headers: ['Content-Type', 'Authorization', 'X-Requested-With']
      allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
      allow_credentials: true
      expose_headers: ['Authorization']  # 👈 AJOUT
      max_age: 3600